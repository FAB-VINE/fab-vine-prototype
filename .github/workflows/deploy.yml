name: Deploy landing page

on:
  push:
    branches:
      - main
    paths:
      - 'LANDING-PAGE/**'
      - 'MANUALS/**'
      - 'NODE-LOGIC/fab-vine-node/V1/tools/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: LANDING-PAGE/package-lock.json

      - name: Install dependencies
        working-directory: LANDING-PAGE
        run: npm ci

      - name: Build
        working-directory: LANDING-PAGE
        run: npm run build

      - name: Include manuals
        run: |
          mkdir -p LANDING-PAGE/dist/MANUALS
          cp -R MANUALS/. LANDING-PAGE/dist/MANUALS/

      - name: Include OLED preview tools
        run: |
          mkdir -p LANDING-PAGE/dist/NODE-LOGIC/fab-vine-node/V1/tools
          cp -R NODE-LOGIC/fab-vine-node/V1/tools/. LANDING-PAGE/dist/NODE-LOGIC/fab-vine-node/V1/tools/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: LANDING-PAGE/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
